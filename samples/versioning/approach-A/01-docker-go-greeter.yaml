apiVersion: openchoreo.dev/v1alpha1
kind: ComponentType
metadata:
  name: greeter-versioned-service
  namespace: default
spec:
  workloadType: deployment
  allowedWorkflows:
    - kind: ClusterWorkflow
      name: dockerfile-builder
  parameters:
    openAPIV3Schema:
      type: object
      required:
        - version
        - pathPrefix
      properties:
        version:
          type: string
          pattern: "^v[0-9]+$"
        pathPrefix:
          type: string
          pattern: "^/v[0-9]+$"
        hostname:
          type: string
          default: docker-go-greeter.openchoreoapis.localhost
  environmentConfigs:
    openAPIV3Schema:
      type: object
      $defs:
        ResourceQuantity:
          type: object
          default: {}
          properties:
            cpu:
              type: string
              default: 100m
            memory:
              type: string
              default: 256Mi
        ResourceRequirements:
          type: object
          default: {}
          properties:
            limits:
              $ref: '#/$defs/ResourceQuantity'
            requests:
              $ref: '#/$defs/ResourceQuantity'
      properties:
        imagePullPolicy:
          type: string
          default: IfNotPresent
          enum:
            - Always
            - IfNotPresent
            - Never
        replicas:
          type: integer
          default: 1
          minimum: 0
        resources:
          $ref: '#/$defs/ResourceRequirements'
  validations:
    - rule: ${size(workload.endpoints) > 0}
      message: Greeter services must have at least one endpoint.
    - rule: |-
        ${workload.endpoints.exists(name, ep, "external" in ep.visibility)
          ? has(gateway.ingress) && has(gateway.ingress.external)
          : true}
      message: External endpoints require gateway.ingress.external to be configured.
  resources:
    - id: deployment
      targetPlane: dataplane
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${metadata.name}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          replicas: ${environmentConfigs.replicas}
          selector:
            matchLabels: ${metadata.podSelectors}
          template:
            metadata:
              labels: ${metadata.podSelectors}
            spec:
              containers:
                - name: main
                  image: ${workload.container.image}
                  imagePullPolicy: ${environmentConfigs.imagePullPolicy}
                  command: |
                    ${has(workload.container.command) ? workload.container.command : oc_omit()}
                  args: |
                    ${has(workload.container.args) ? workload.container.args : oc_omit()}
                  env: ${dependencies.toContainerEnvs()}
                  envFrom: ${configurations.toContainerEnvFrom()}
                  resources:
                    limits:
                      cpu: ${environmentConfigs.resources.limits.cpu}
                      memory: ${environmentConfigs.resources.limits.memory}
                    requests:
                      cpu: ${environmentConfigs.resources.requests.cpu}
                      memory: ${environmentConfigs.resources.requests.memory}
                  volumeMounts: ${configurations.toContainerVolumeMounts() + dependencies.toContainerVolumeMounts()}
              volumes: ${configurations.toVolumes() + dependencies.toVolumes()}
    - id: service
      targetPlane: dataplane
      includeWhen: ${size(workload.endpoints) > 0}
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${metadata.componentName}
          namespace: ${metadata.namespace}
          labels: ${metadata.labels}
        spec:
          type: ClusterIP
          selector: ${metadata.podSelectors}
          ports: ${workload.toServicePorts()}
    - id: httproute-external
      targetPlane: dataplane
      forEach: ${workload.endpoints.transformMap(name, ep, "external" in ep.visibility && ep.type in ["HTTP", "GraphQL", "Websocket"], ep)}
      var: endpoint
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${oc_generate_name("docker-go-greeter", parameters.version, endpoint.key)}
          namespace: ${metadata.namespace}
          labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name": endpoint.key, "openchoreo.dev/endpoint-visibility": "external"})}'
        spec:
          parentRefs:
            - name: ${gateway.ingress.external.name}
              namespace: ${gateway.ingress.external.namespace}
          hostnames:
            - ${parameters.hostname}
          rules:
            - matches:
                - path:
                    type: PathPrefix
                    value: ${parameters.pathPrefix}
              filters:
                - type: URLRewrite
                  urlRewrite:
                    path:
                      type: ReplacePrefixMatch
                      replacePrefixMatch: ${endpoint.value.?basePath.orValue("/")}
              backendRefs:
                - name: ${metadata.componentName}
                  port: ${endpoint.value.port}
---
apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: docker-go-greeter-v1
  namespace: default
spec:
  owner:
    projectName: default
  componentType:
    kind: ComponentType
    name: deployment/greeter-versioned-service
  autoDeploy: false
  autoBuild: false
  parameters:
    version: v1
    pathPrefix: /v1
    hostname: docker-go-greeter.openchoreoapis.localhost
  workflow:
    kind: ClusterWorkflow
    name: dockerfile-builder
    parameters:
      repository:
        url: https://github.com/chathuranga95/docker-go-greeter
        revision:
          branch: main
          commit: 541549ce96fa41719a272183defcc3184633ed47
        appPath: .
      docker:
        context: .
        filePath: Dockerfile
---
apiVersion: openchoreo.dev/v1alpha1
kind: WorkflowRun
metadata:
  name: docker-go-greeter-v1-build-541549ce
  namespace: default
