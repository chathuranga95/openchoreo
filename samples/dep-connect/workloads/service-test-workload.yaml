apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: service-test
  namespace: default
spec:
  owner:
    projectName: default

  componentType:
    kind: ClusterComponentType
    name: deployment/service
  autoDeploy: true

---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: service-test
  namespace: default
spec:
  owner:
    componentName: service-test
    projectName: default
  endpoints:
    http:
      type: HTTP
      port: 8080
      visibility: [project]
  dependencies:
    endpoints:
      - project: default
        component: demo-app-http-service
        name: http
        visibility: namespace
        envBindings:
          address: HTTP_SERVICE_URL
      - project: default
        component: demo-app-grpc-service
        name: grpc
        visibility: namespace
        envBindings:
          address: GRPC_SERVICE_URL
      - project: default
        component: database-test
        name: db-http
        visibility: namespace
        envBindings:
          address: DATABASE_SERVICE_URL
  container:
    image: ghcr.io/openchoreo/samples/service-test:latest
