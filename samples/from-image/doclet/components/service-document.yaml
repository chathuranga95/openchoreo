apiVersion: openchoreo.dev/v1alpha1
kind: Component
metadata:
  name: doclet-document
  namespace: default
spec:
  owner:
    projectName: doclet

  componentType:
    kind: ClusterComponentType
    name: deployment/service
  autoDeploy: true

---
apiVersion: openchoreo.dev/v1alpha1
kind: Workload
metadata:
  name: doclet-document
  namespace: default
spec:
  owner:
    componentName: doclet-document
    projectName: doclet
  endpoints:
    http:
      type: HTTP
      port: 8080
      visibility: [project]
  dependencies:
    endpoints:
      # greeter-service lives in project "default" (this component is in project "doclet"),
      # so it is consumed cross-project via "namespace" visibility. Its "http" endpoint
      # resolves to the in-cluster serviceURL, tunnelled by `occ dev connect`.
      - project: default
        component: greeter-service
        name: http
        visibility: namespace
        envBindings:
          address: GREETER_SERVICE_URL
      # h2-greeter also lives in project "default"; its "grpc" endpoint is a TCP endpoint,
      # so the address binding is rendered as host:port (no scheme).
      - project: default
        component: h2-greeter
        name: grpc
        visibility: namespace
        envBindings:
          address: H2_GREETER_URL
    resources:
      - ref: doclet-postgres
        envBindings:
          host: DB_HOST
          port: DB_PORT
          username: DB_USER
          password: DB_PASSWORD
          database: DB_NAME
      - ref: doclet-nats
        envBindings:
          url: DOCLET_NATS_URL
  container:
    image: ghcr.io/openchoreo/samples/doclet-document:latest
